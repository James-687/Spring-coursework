<!DOCTYPE html>
<html>
<head>
    <title>Web Development Technologies</title>
    <link rel="stylesheet" href="/static/shopCSS.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Web development technologies</h1>
    <button onclick="window.location.href='/basket'">View Basket</button>
    <ul>
        {% for tech in technologies %}
            <li>
                <h2>{{ tech.name }}</h2>
                <p>Price: {{ tech.price }}</p>
                <img src="/static/{{ {'Headphones': 'headphones.jpg', 'Speakers': 'speaker.jpg', 'Earphones': 'earphones.jpg'}[tech.name] }}" alt="{{ tech.name }}" width="200">
                <p></p>
                <button onclick="window.location.href='/tech/{{ tech.id }}'">View Details</button>
                <p></p>
                <button onclick="window.location.href='/add_to_basket/{{ tech.id }}'">Add to Basket</button>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
