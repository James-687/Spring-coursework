<!DOCTYPE html>
<html>
<head>
    <title>Web Development Technologies</title>
</head>
<body>
    <h1>Web development technologies</h1>
    <ul>
        {% for tech in technologies %}
            <li>
                <h2>{{ tech.name }}</h2>
                <p>Price: {{ tech.price }}</p>
                <p>{{ tech.description }}</p>
                <img src="{{ url_for('static', filename=tech.image) }}" alt="{{ tech.name }}" width="200">
                <a href="/tech/{{ loop.index0 }}">View Details</a>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
