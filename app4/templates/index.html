<!DOCTYPE html>
<html>
<head>
    <title>Technology shop</title>
    <link rel="stylesheet" href="/static/shopCSS.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <h2>Navigation</h2>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/basket">View Basket</a></li>
            </ul>
        </div>
        <div class="right-section">
            <div class="header">
                <h1>Technology shop</h1>
            </div>
            <div class="content">
                <h2>Hover over a photo to see the environmental impact</h2>
                <ul>
                    {% for tech in technologies %}
                        <li>
                <h2>{{ tech.name }}</h2>
                <p>Price: {{ tech.price }}</p>
                <figure class="hover-img"><strong>Preview:</strong><br>
                    <img src="/static/{{ {'Headphones': 'headphones.jpg', 'Speakers': 'speakers.jpg', 'Earphones': 'earphones.jpg', 'Smartphone': 'smartphone.jpg', 'Laptop': 'laptop.jpg', 'Tablet': 'tablet.jpg', 'Smartwatch': 'smartwatch.jpg', 'Gaming Console': 'gaming_console.jpg', 'Camera': 'camera.jpg'}[tech.name] }}" alt="{{ tech.name }}" width="200">
                    <figcaption>
                        <h3>{{ tech.enviromentalImpact }}</h3>
                    </figcaption>
                </figure>
                <p></p>
                <button onclick="window.location.href='/tech/{{ tech.id }}'">View Details</button>
                <p></p>
                <button onclick="window.location.href='/add_to_basket/{{ tech.id }}'">Add to Basket</button>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
