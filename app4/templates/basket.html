<!DOCTYPE html>
<html>
<head>
    <title>Your Basket</title>
    <link rel="stylesheet" href="/static/shopCSS.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <h2>Navigation</h2>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/basket">View Basket</a></li>
            </ul>
        </div>
        <div class="right-section">
            <div class="header">
    <h1>Your Basket</h1>
    
    {% if basket_items %}
        <ul>
            {% for item in basket_items %}
                <li>
                    <h3>{{ item.name }}</h3>
                    <p>Price: {{ item.price }}</p>
                    <img src="/static/{{ item.image }}" alt="{{ item.name }}" width="100">
                    <button onclick="window.location.href='/remove_from_basket/{{ item.id }}'">Remove from Basket</button>
                </li>
            {% endfor %}
        </ul>
        <p>Total items: {{ basket_items|length }}</p>
    {% else %}
        <p>Your basket is empty.</p>
    {% endif %}
</body>
</html>
