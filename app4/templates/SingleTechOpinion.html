<!DOCTYPE html>
<html>
<head>
    <title>{{ technology.name }} - Your Opinion</title>
    <link rel="stylesheet" href="/static/shopCSS.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <h2>Navigation</h2>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/basket">View Basket</a></li>
            </ul>
        </div>
        <div class="right-section">
            <div class="header">
    <h1>{{ technology.name }}</h1>
    <p>Price: {{ technology.price }}</p>
    <p>{{ technology.description }}</p>
    <img src="/static/{{ {'Headphones': 'headphones.jpg', 'Speakers': 'speaker.jpg', 'Earphones': 'earphones.jpg'}[technology.name] }}" alt="{{ technology.name }}" width="200">
    <br><br>
    <h2>Your Opinion:</h2>
    <p>{{ opinion }}</p>
    <br>
    <button onclick="window.location.href='/tech/{{ techId }}'">Back to Product</button> 
</body>
</html>
