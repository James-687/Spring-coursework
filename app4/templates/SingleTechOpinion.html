<!DOCTYPE html>
<html>
<head>
    <title>{{ technology.name }} - Your Opinion</title>
</head>
<body>
    <h1>{{ technology.name }}</h1>
    <p>Price: {{ technology.price }}</p>
    <p>{{ technology.description }}</p>
    <img src="/static/{{ technology.image }}" alt="{{ technology.name }}" width="200">
    <br><br>
    <h2>Your Opinion:</h2>
    <p>{{ opinion }}</p>
    <br>
    <a href="/tech/{{ techId }}">Back to Product</a> | <a href="/">Back to Gallery</a>
</body>
</html>
